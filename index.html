<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyRoom — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:      #080810;
      --card:    #11111e;
      --border:  rgba(255,255,255,0.07);
      --accent:  #6c63ff;
      --accent2: #ff6584;
      --text:    #f0f0ff;
      --text2:   #7070a0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Анимированный фон — пульсирующие круги */
    .bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: drift 8s ease-in-out infinite;
    }
    .orb-1 { width:500px; height:500px; background:var(--accent); top:-150px; left:-150px; animation-delay:0s; }
    .orb-2 { width:400px; height:400px; background:var(--accent2); bottom:-100px; right:-100px; animation-delay:-4s; }
    @keyframes drift {
      0%,100% { transform:translate(0,0); }
      50%      { transform:translate(30px,20px); }
    }

    /* Сетка */
    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(108,99,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(108,99,255,0.04) 1px, transparent 1px);
      background-size:40px 40px;
      pointer-events:none;
      z-index:0;
    }

    /* Карточка */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 56px 48px 48px;
      width: 420px;
      max-width: 95vw;
      text-align: center;
      box-shadow:
        0 0 0 1px var(--border),
        0 40px 80px rgba(0,0,0,0.6);
      animation: appear .6s cubic-bezier(.16,1,.3,1);
    }
    @keyframes appear {
      from { opacity:0; transform:translateY(32px) scale(0.97); }
      to   { opacity:1; transform:translateY(0)    scale(1); }
    }

    /* Лого-иконка */
    .logo-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 28px;
      position: relative;
    }
    .logo-ring {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 0 40px rgba(108,99,255,0.5);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform:translateY(0); }
      50%      { transform:translateY(-6px); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 40%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text2);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    /* Кнопка Google */
    .btn-google {
      width: 100%;
      padding: 15px 24px;
      background: #fff;
      color: #1a1a2e;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all .2s;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25);
    }
    .btn-google:hover { transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,0.35); }
    .btn-google:active { transform:scale(0.98); }

    /* Статус загрузки */
    .status-msg {
      margin-top: 20px;
      font-size: 13px;
      color: var(--text2);
      min-height: 20px;
      transition: all .3s;
    }
    .status-msg.error { color: #ff6b6b; }

    /* Разделитель */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--text2);
      font-size: 12px;
    }
    .divider::before,.divider::after {
      content:'';
      flex:1;
      height:1px;
      background:var(--border);
    }

    /* Фичи */
    .features {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      text-align: left;
    }
    .feature {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text2);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feature-icon { font-size: 16px; }

    /* Спиннер */
    .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(26,26,46,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-ring">📚</div>
  </div>

  <h1>StudyRoom</h1>
  <p class="subtitle">Учись вместе с группой.<br>Отслеживай прогресс, получай достижения.</p>

  <button class="btn-google" id="google-btn" onclick="loginGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <div class="spinner" id="spinner"></div>
    <span id="btn-text">Войти через Google</span>
  </button>

  <div class="status-msg" id="status-msg">Нажмите, чтобы выбрать аккаунт Google</div>

  <div class="divider">что вас ждёт внутри</div>

  <div class="features">
    <div class="feature"><span class="feature-icon">⏱️</span> Таймер сессии</div>
    <div class="feature"><span class="feature-icon">💬</span> Общий чат</div>
    <div class="feature"><span class="feature-icon">🟢</span> Кто онлайн</div>
    <div class="feature"><span class="feature-icon">🏆</span> Топ студентов</div>
    <div class="feature"><span class="feature-icon">🎖️</span> Достижения</div>
    <div class="feature"><span class="feature-icon">📊</span> Статистика</div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   КОНФИГУРАЦИЯ — вставьте ваши ключи из Supabase
   Dashboard → Settings → API
   ═══════════════════════════════════════════════ */
const SUPABASE_URL  = 'https://fzekwtotuljnqfnevsfv.supabase.co';
const SUPABASE_ANON = 'sb_publishable_FqyHx6wafe1-0E6aGBD0qQ_Lw1AQFmb';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ── Вычисляем базовый путь автоматически ──
   На GitHub Pages адрес выглядит так:
   https://username.github.io/repo-name/index.html
   Нам нужна папка: https://username.github.io/repo-name/
   Берём текущий pathname и убираем имя файла в конце.         */
function getBaseUrl() {
  const path = window.location.pathname;              // /repo-name/index.html
  const base = path.substring(0, path.lastIndexOf('/') + 1); // /repo-name/
  return window.location.origin + base;               // https://...github.io/repo-name/
}

/* Проверяем — вдруг уже вошли (после редиректа от Google) */
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    window.location.href = getBaseUrl() + 'app.html';
  }
}

/* Вход через Google OAuth */
async function loginGoogle() {
  const btn    = document.getElementById('google-btn');
  const spin   = document.getElementById('spinner');
  const label  = document.getElementById('btn-text');
  const status = document.getElementById('status-msg');

  btn.disabled = true;
  spin.style.display = 'block';
  label.textContent  = 'Перенаправляем…';
  status.textContent = 'Открываем Google…';
  status.className   = 'status-msg';

  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      /* После входа Google вернёт пользователя сюда.
         Supabase обработает токен и перенаправит дальше.       */
      redirectTo:  getBaseUrl() + 'app.html',
      queryParams: { prompt: 'select_account' }
    }
  });

  if (error) {
    spin.style.display = 'none';
    label.textContent  = 'Войти через Google';
    btn.disabled       = false;
    status.textContent = '⚠ Ошибка: ' + error.message;
    status.className   = 'status-msg error';
  }
}

checkSession();
</script>
</body>
</html>
